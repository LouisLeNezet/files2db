name: Run Python Tests

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12, 3.13]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Cache conda packages
        uses: actions/cache@v3
        with:
          path: ~/.conda/pkgs
          key: conda-pkgs-${{ matrix.python-version }}-${{ hashFiles('environment.yml') }}
          restore-keys: |
            conda-pkgs-${{ matrix.python-version }}-

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          activate-environment: test_env
          environment-file: environment.yml
          use-only-tar-bz2: true

      - name: Install pip dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .

      - name: Run tests with coverage
        run: |
          pytest tests --cov=files2db --cov-report=xml --cov-report=term-missing

      - name: Run CLI help test
        run: files2db --help

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true # optional (default = false)
          files: codecov/test-results-action@v1
          flags: unittests # optional
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true # optional (default = false)
